# The complete F8 environment as ONE unit: engine + API + F8 Studio UI in one container,
# plus the NL-assist model backend (Ollama with phi4-mini base + phi4-f8-mini fine-tune;
# the larger full-Phi-4 fine-tune phi4-f8 is opt-in - feature delegate-model-variants).
# Manage the environment as a whole - not individual containers:
#
#   npm run env:up                   # start everything (detects NVIDIA GPU automatically)
#   F8_GPU=0 npm run env:up          # force CPU-only mode (no GPU acceleration)
#   F8_GPU=1 npm run env:up          # force GPU mode (fails if no NVIDIA GPU + toolkit)
#   npm run env:down                 # stop everything; named volumes persist
#   npm run env:logs                 # follow the whole environment
#   npm run env:status               # check running status
#
# F8 itself bundles no model weights or runtime (nl-assist spec FR-26.2) - Ollama and the
# weights are pulled ON THIS MACHINE from their upstream registries; their MIT licenses
# bind the user running them.
#
# GPU acceleration is automatic: npm run env:up detects your host's NVIDIA GPU and applies
# GPU settings automatically. To override:
#   - Force GPU off (CPU-only):  F8_GPU=0 npm run env:up
#   - Force GPU on (NVIDIA):     F8_GPU=1 npm run env:up
#
# For AMD GPUs, use the Ollama rocm image manually (not yet covered by this compose).
#
#   F8 Studio:  http://localhost:8080
#   NL assist:  endpoint http://localhost:11434, api kind "ollama". The UI defaults to the
#               fine-tuned "phi4-f8-mini" model (nl-assist-finetune). Override its pull source
#               via F8_DELEGATE_REPO. To also serve the larger GPU-only "phi4-f8", set
#               F8_PULL_PHI4F8=1 (source F8_PHI4F8_REPO); ~9GB, so it is off by default.
#   Embeddings: text-in embedding, semantic search and queryText traversal work out of the
#               box - the same Ollama sidecar serves bge-m3 (MIT). Opt out with
#               F8_EMBEDDINGS=false. Docs: features/done/embedding-provider/README.md.

services:
  fallen8:
    build: .
    restart: unless-stopped
    # Give the clean-shutdown checkpoint time to write + register before SIGKILL (compose's
    # default grace is 10s; a large graph's save can take longer). If it is still killed,
    # committed writes are recovered from the WAL on the next boot.
    stop_grace_period: 60s
    ports:
      # Host port is configurable (F8_PORT) so the environment does not collide with
      # something already on 8080; the container always listens on 8080.
      - "${F8_PORT:-8080}:8080"
    environment:
      # Durable graph data AND the save-game registry live on the named volume, so both
      # survive container recreation together (feature save-games).
      - Fallen8__Durability__StorageDirectory=/data
      - Fallen8__Metadata__Directory=/data/metadata
      # Opt-in security posture; set a real key before exposing beyond localhost.
      - Fallen8__Security__ApiKey=${F8_API_KEY:-}
      - Fallen8__Security__EnableDynamicCodeExecution=${F8_ENABLE_DYNAMIC_CODE:-false}
      # Text-in embeddings out of the box (feature embedding-out-of-box): the Ollama
      # sidecar serves bge-m3 (MIT, 1024-dim, Cosine). F8_EMBEDDINGS=false opts out
      # (embedding endpoints answer 403; bring-your-own-vector keeps working). Swapping
      # the model means editing this block as one unit - the declared ModelName/Dimension
      # must match what the sidecar serves.
      - Fallen8__Embedding__Enabled=${F8_EMBEDDINGS:-true}
      - Fallen8__Embedding__Backend=Ollama
      - Fallen8__Embedding__ModelName=bge-m3
      - Fallen8__Embedding__Dimension=1024
      - Fallen8__Embedding__IntendedMetric=Cosine
      - Fallen8__Embedding__Ollama__Endpoint=http://ollama:11434
      - Fallen8__Embedding__Ollama__Model=bge-m3
    volumes:
      - f8-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - f8-net

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # The browser calls Ollama directly (nl-assist spec §4); allow the F8 origin
      # (keep in sync with F8_PORT).
      - OLLAMA_ORIGINS=http://localhost:${F8_PORT:-8080}
      # Fine-tune pull sources, tagged locally to the short variant names (phi4-f8-mini / phi4-f8).
      # Override to run your own published fine-tune. phi4-f8 is opt-in (F8_PULL_PHI4F8=1): ~9GB,
      # GPU-recommended, so it is never pulled by default.
      - F8_DELEGATE_REPO=${F8_DELEGATE_REPO:-stoic_hellman_728/phi4-f8-mini}
      - F8_PHI4F8_REPO=${F8_PHI4F8_REPO:-stoic_hellman_728/phi4-f8}
      - F8_PULL_PHI4F8=${F8_PULL_PHI4F8:-0}
      # Keep in sync with the fallen8 service's embedding block: when embeddings are on
      # (the default), the sidecar also pulls the bge-m3 embedding model (~1.2 GB once).
      - F8_EMBEDDINGS=${F8_EMBEDDINGS:-true}
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - f8-net

volumes:
  # Explicit names keep the volumes stable regardless of the compose project name (and
  # reuse an already-pulled model set from earlier setups).
  f8-data:
    name: f8-data
  ollama-models:
    name: f8-ollama-models

networks:
  f8-net:
    name: f8-net
    driver: bridge
