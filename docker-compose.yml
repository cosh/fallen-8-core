# The complete F8 environment as ONE unit: engine + API + F8 Studio UI in one container,
# plus the NL-assist model backend (official Ollama image with the MIT default model,
# phi4-mini). Manage the environment as a whole - not individual containers:
#
#   docker compose up -d --build     # start everything (npm run env:up, which also
#                                    # applies docker-compose.gpu.yml on NVIDIA hosts)
#   docker compose down              # stop everything; named volumes persist (npm run env:down)
#   docker compose logs -f           # follow the whole environment (npm run env:logs)
#
# F8 itself bundles no model weights or runtime (nl-assist spec FR-26.2) - Ollama and the
# weights are pulled ON THIS MACHINE from their upstream registries; their MIT licenses
# bind the user running them.
#
#   F8 Studio:  http://localhost:8080
#   NL assist:  endpoint http://localhost:11434, api kind "ollama". The UI DEFAULTS to the
#               fine-tuned "f8-delegate" model (nl-assist-finetune); ollama-init below pulls
#               "phi4-mini" as its base and the stock fallback. Create f8-delegate with the
#               training pipeline (nl-assist-finetune/run.sh) or pick the phi4-mini preset.

services:
  fallen8:
    build: .
    restart: unless-stopped
    # Give the clean-shutdown checkpoint time to write + register before SIGKILL (compose's
    # default grace is 10s; a large graph's save can take longer). If it is still killed,
    # committed writes are recovered from the WAL on the next boot.
    stop_grace_period: 60s
    ports:
      # Host port is configurable (F8_PORT) so the environment does not collide with
      # something already on 8080; the container always listens on 8080.
      - "${F8_PORT:-8080}:8080"
    environment:
      # Durable graph data AND the save-game registry live on the named volume, so both
      # survive container recreation together (feature save-games).
      - Fallen8__Durability__StorageDirectory=/data
      - Fallen8__Metadata__Directory=/data/metadata
      # Opt-in security posture; set a real key before exposing beyond localhost.
      - Fallen8__Security__ApiKey=${F8_API_KEY:-}
      - Fallen8__Security__EnableDynamicCodeExecution=${F8_ENABLE_DYNAMIC_CODE:-false}
    volumes:
      - f8-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # The browser calls Ollama directly (nl-assist spec §4); allow the F8 origin
      # (keep in sync with F8_PORT).
      - OLLAMA_ORIGINS=http://localhost:${F8_PORT:-8080}
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # One-shot: pulls the models into the shared volume on first start. Waits for the healthy
  # daemon and retries the base pull (registry hiccups), so the models are reliably present
  # after `up`. phi4-mini (base + stock fallback) is REQUIRED; the fine-tuned f8-delegate -
  # the UI default (feature nl-assist-finetune) - is pulled best-effort from its operator
  # registry and tagged locally as `f8-delegate`, so a fresh deploy is turnkey once that model
  # is published (feedback-loop FL-4). Until it is, the pull is skipped and the UI default
  # 404s - pick the stock phi4-mini preset meanwhile. Override the source with F8_DELEGATE_REPO.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - "ok=0; for i in $$(seq 1 20); do ollama pull phi4-mini && { ok=1; break; }; echo 'phi4-mini pull failed, retrying...'; sleep 5; done; [ $$ok -eq 1 ] || { echo 'could not pull phi4-mini; pull it manually'; exit 1; }; ollama pull \"$$F8_DELEGATE_REPO\" && ollama cp \"$$F8_DELEGATE_REPO\" f8-delegate && echo \"f8-delegate ready (UI default) from $$F8_DELEGATE_REPO\" || echo \"f8-delegate not available at $$F8_DELEGATE_REPO yet; UI default will 404 - use the phi4-mini preset until it is published\"; exit 0"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - F8_DELEGATE_REPO=${F8_DELEGATE_REPO:-stoic_hellman_728/f8-delegate}

volumes:
  # Explicit names keep the volumes stable regardless of the compose project name (and
  # reuse an already-pulled model set from earlier setups).
  f8-data:
    name: f8-data
  ollama-models:
    name: f8-ollama-models
